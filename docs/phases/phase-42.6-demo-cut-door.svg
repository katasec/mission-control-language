<svg viewBox="0 0 680 446" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title>Phase 42.6 — the demo cut as a reversible (two-way) door</title>
  <desc>ForgeAPI embeds the billing lib in-process against a separate authbilling database on the same Postgres server; the runner stays internal with no database. Three marked seams keep the north-star extraction a two-way door: ForgeAPI is its own service, billing is behind an interface, and authbilling_db is already a separate database.</desc>

  <rect width="680" height="446" fill="#ffffff"/>
  <text x="40" y="18" fill="#333333" font-size="13" font-weight="600">Phase 42.6 demo cut — a two-way door (collapse tier-2 auth/billing inline; every seam pre-cut)</text>

  <defs>
    <marker id="arr26" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8a8880" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <g transform="translate(0,24)">
    <g>
      <rect x="270" y="28" width="140" height="30" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
      <text x="340" y="48" text-anchor="middle" fill="#444441" font-size="13" font-weight="500">CDN</text>
    </g>

    <g>
      <rect x="40" y="90" width="120" height="54" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
      <text x="100" y="114" text-anchor="middle" fill="#085041" font-size="13" font-weight="500">ForgeUI</text>
      <text x="100" y="131" text-anchor="middle" fill="#0F6E56" font-size="11">rooms · same lib</text>
    </g>

    <g>
      <rect x="214" y="80" width="252" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
      <text x="340" y="100" text-anchor="middle" fill="#085041" font-size="13" font-weight="500">ForgeAPI</text>
      <text x="340" y="115" text-anchor="middle" fill="#0F6E56" font-size="11">/v1 · platform-key auth · routing</text>
    </g>
    <rect x="228" y="124" width="224" height="30" rx="6" fill="none" stroke="#0F6E56" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="340" y="143" text-anchor="middle" fill="#0F6E56" font-size="11">auth + billing lib (in-proc)</text>

    <g>
      <rect x="300" y="206" width="200" height="54" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
      <text x="400" y="230" text-anchor="middle" fill="#3C3489" font-size="13" font-weight="500">Runner</text>
      <text x="400" y="247" text-anchor="middle" fill="#534AB7" font-size="11">mission exec · no DB creds</text>
    </g>

    <g>
      <rect x="540" y="206" width="90" height="54" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
      <text x="585" y="230" text-anchor="middle" fill="#444441" font-size="13" font-weight="500">Web</text>
      <text x="585" y="247" text-anchor="middle" fill="#5F5E5A" font-size="11">egress</text>
    </g>

    <rect x="150" y="300" width="380" height="80" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
    <text x="168" y="320" fill="#444441" font-size="13" font-weight="500">Postgres server · one instance</text>
    <rect x="168" y="328" width="180" height="44" rx="6" fill="#ffffff" stroke="#888780" stroke-width="0.8"/>
    <text x="258" y="348" text-anchor="middle" fill="#444441" font-size="13" font-weight="500">authbilling_db</text>
    <text x="258" y="363" text-anchor="middle" fill="#5F5E5A" font-size="11">keys · ledger</text>
    <rect x="356" y="328" width="160" height="44" rx="6" fill="#ffffff" stroke="#888780" stroke-width="0.8"/>
    <text x="436" y="348" text-anchor="middle" fill="#444441" font-size="13" font-weight="500">rooms_db</text>
    <text x="436" y="363" text-anchor="middle" fill="#5F5E5A" font-size="11">messages · members</text>

    <line x1="340" y1="58" x2="340" y2="80" stroke="#8a8880" stroke-width="1.4" marker-end="url(#arr26)"/>
    <line x1="368" y1="160" x2="400" y2="206" stroke="#8a8880" stroke-width="1.4" marker-end="url(#arr26)"/>
    <text x="392" y="188" fill="#8a8880" font-size="11">/run</text>
    <line x1="285" y1="160" x2="258" y2="328" stroke="#8a8880" stroke-width="1.4" marker-end="url(#arr26)"/>
    <line x1="105" y1="144" x2="172" y2="300" stroke="#8a8880" stroke-width="1.4" marker-end="url(#arr26)"/>
    <line x1="500" y1="233" x2="540" y2="233" stroke="#8a8880" stroke-width="1.4" marker-end="url(#arr26)"/>

    <g>
      <circle cx="204" cy="86" r="9" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
      <text x="204" y="90" text-anchor="middle" fill="#633806" font-size="11" font-weight="500">1</text>
    </g>
    <g>
      <circle cx="216" cy="139" r="9" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
      <text x="216" y="143" text-anchor="middle" fill="#633806" font-size="11" font-weight="500">2</text>
    </g>
    <g>
      <circle cx="156" cy="344" r="9" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
      <text x="156" y="348" text-anchor="middle" fill="#633806" font-size="11" font-weight="500">3</text>
    </g>
  </g>

  <text x="340" y="418" text-anchor="middle" fill="#8a8880" font-size="11">seams, all pre-cut — 1: ForgeAPI is its own service · 2: billing behind an interface (in-proc lib)</text>
  <text x="340" y="434" text-anchor="middle" fill="#8a8880" font-size="11">3: authbilling_db already separate → extraction needs no data migration, no client change</text>
</svg>
