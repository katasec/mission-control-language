name: forge-api image

# Build + publish the ForgeAPI container image to ACR. ForgeAPI is the public API-A gateway
# (`api.forge.katasec.com`) and rolls independently from ForgeUI and the internal runner.
#
# Security posture:
#   * Auth to Azure is GitHub -> Azure OIDC federation (id-token). There is NO Azure client secret.
#   * ACR push uses the CI identity's AcrPush role via `az acr login` — no registry password.
#   * Dockerfile.forgeapi does not pull private GitHub Packages, so no NuGet build secret is needed.
#   * Runtime secrets are Key Vault references injected by the Container App, never image content.

on:
  push:
    tags:
      - 'forge-api-v*'          # e.g. forge-api-v0.2.0 -> image tag 0.2.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version, e.g. 0.2.0'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  build-push:
    runs-on: ubuntu-latest
    environment: forge-ui-image   # shared "push image to ACR" env (see forge-runner-image.yml)
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ inputs.version }}"
          else
            v="${GITHUB_REF_NAME#forge-api-v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Building forge-api:$v"

      - name: Azure login (OIDC federation — no stored secret)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CI_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login (managed identity — no registry password)
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - uses: docker/setup-buildx-action@v3

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.forgeapi
          push: true
          tags: |
            ${{ vars.ACR_LOGIN_SERVER }}/forge-api:${{ steps.ver.outputs.version }}
            ${{ vars.ACR_LOGIN_SERVER }}/forge-api:sha-${{ github.sha }}
            ${{ vars.ACR_LOGIN_SERVER }}/forge-api:dev-latest
