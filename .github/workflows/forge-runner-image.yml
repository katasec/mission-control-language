name: forge-runner image

# Build + publish the ForgeMission.Runner (stateless mission runner, Phase 39.1) container image
# to ACR. Mirrors forge-ui-image.yml exactly — same ACR, same CI identity, same security posture.
#
# Security posture:
#   * Auth to Azure is GitHub -> Azure OIDC federation (id-token). NO Azure client secret.
#   * ACR push uses the CI identity's AcrPush role via `az acr login` — no registry password.
#   * The image references PRIVATE GitHub Packages (Katasec.OaiServer/OciClient via ForgeMission.Cli),
#     so restore needs a read:packages token, passed as a BuildKit SECRET MOUNT (never in a layer).
#   * The image carries no runtime secrets — MCL_API_KEY etc. are injected at run time from Key
#     Vault by the Container App.
#
# Reuses `environment: forge-ui-image` deliberately: it is the "push an image to ACR" environment,
# and the CI managed identity's federated credential is bound to that environment subject
# (katasec/mission-control-language:environment:forge-ui-image). A separate environment would need
# a new federated credential provisioned on id-forge-ci-dev (dev/150-ci).

on:
  push:
    tags:
      - 'forge-runner-v*'      # e.g. forge-runner-v0.2.0 -> image tag 0.2.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version, e.g. 0.2.0'
        required: true

permissions:
  id-token: write              # OIDC federation to Azure
  contents: read
  packages: read               # read the private NuGet (GitHub Packages) feed

jobs:
  build-push:
    runs-on: ubuntu-latest
    environment: forge-ui-image   # shared "push image to ACR" env (see header)
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ inputs.version }}"
          else
            v="${GITHUB_REF_NAME#forge-runner-v}"   # strip the tag prefix
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Building forge-runner:$v"

      - name: Azure login (OIDC federation — no stored secret)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CI_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login (managed identity — no registry password)
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - uses: docker/setup-buildx-action@v3

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.runner
          push: true
          # read:packages token for the private feed, mounted as a BuildKit secret (never in a
          # layer). Prefer GITHUB_TOKEN; set a NUGET_AUTH_TOKEN repo secret to override.
          secrets: |
            nuget_token=${{ secrets.NUGET_AUTH_TOKEN != '' && secrets.NUGET_AUTH_TOKEN || secrets.GITHUB_TOKEN }}
          tags: |
            ${{ vars.ACR_LOGIN_SERVER }}/forge-runner:${{ steps.ver.outputs.version }}
            ${{ vars.ACR_LOGIN_SERVER }}/forge-runner:sha-${{ github.sha }}
            ${{ vars.ACR_LOGIN_SERVER }}/forge-runner:dev-latest
