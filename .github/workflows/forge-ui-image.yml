name: forge-ui image

# Build + publish the ForgeUI (Forge Rooms) container image to ACR.
#
# Security posture:
#   * Auth to Azure is GitHub -> Azure OIDC federation (id-token). There is NO Azure client
#     secret stored in GitHub — the federated credential on the CI identity is the trust anchor.
#   * ACR push uses the CI identity's AcrPush role via `az acr login` — no registry password.
#   * The image references PRIVATE GitHub Packages, so restore needs a read:packages token. It is
#     passed to the build as a BuildKit SECRET MOUNT, so it never lands in an image layer or in
#     `docker history`. Source: the workflow's own GITHUB_TOKEN (packages: read), which can read
#     packages in the same org; override with a PAT secret if the feed is in another org.
#   * The image itself carries no runtime secrets — MCL_API_KEY etc. are injected at run time
#     from Key Vault by the Container App.

on:
  push:
    tags:
      - 'forge-ui-v*'          # e.g. forge-ui-v0.1.0  -> image tag 0.1.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version, e.g. 0.1.0'
        required: true

permissions:
  id-token: write              # OIDC federation to Azure
  contents: read
  packages: read               # read the private NuGet (GitHub Packages) feed

jobs:
  build-push:
    runs-on: ubuntu-latest
    environment: forge-ui-image   # scope the federated credential + require any env approvals
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ inputs.version }}"
          else
            v="${GITHUB_REF_NAME#forge-ui-v}"   # strip the tag prefix
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Building forge-ui:$v"

      - name: Azure login (OIDC federation — no stored secret)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CI_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login (managed identity — no registry password)
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - uses: docker/setup-buildx-action@v3

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.forgeui
          push: true
          # read:packages token for the private feed, mounted as a BuildKit secret (never in a
          # layer). Prefer GITHUB_TOKEN; set a NUGET_AUTH_TOKEN repo secret to override.
          secrets: |
            nuget_token=${{ secrets.NUGET_AUTH_TOKEN != '' && secrets.NUGET_AUTH_TOKEN || secrets.GITHUB_TOKEN }}
          tags: |
            ${{ vars.ACR_LOGIN_SERVER }}/forge-ui:${{ steps.ver.outputs.version }}
            ${{ vars.ACR_LOGIN_SERVER }}/forge-ui:sha-${{ github.sha }}
            ${{ vars.ACR_LOGIN_SERVER }}/forge-ui:dev-latest
